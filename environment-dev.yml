name: xeus-pywrap
channels:
  - conda-forge
dependencies:
  # Build dependencies
  - make
  - cmake
  - cxx-compiler
  # Host dependencies
  - xeus-zmq
  - nlohmann_json
  - cppzmq
  - xtl
  - pybind11
  - pybind11_json
  - python>=3.13
  # Test dependencies
  - pytest
  - jupyter_kernel_test>=0.4.3
  - nbval
  - pytest-rerunfailures
  # example kernels additional dependencies
  - tatsu